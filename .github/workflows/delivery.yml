name: delivery

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version
        id: vars
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/calculadora-ci-cd:${{ steps.vars.outputs.VERSION }} .
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/calculadora-ci-cd:${{ steps.vars.outputs.VERSION }} ${{ secrets.DOCKERHUB_USERNAME }}/calculadora-ci-cd:latest

      - name: Push image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/calculadora-ci-cd:${{ steps.vars.outputs.VERSION }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/calculadora-ci-cd:latest